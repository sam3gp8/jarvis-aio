<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JARVIS · Residence 3D — 1111 Myrtle Rd</title>
<style>
  :root { --cyan:#00f2fe; --green:#00f5a0; --bg:#04080c; }
  * { margin:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    background:radial-gradient(ellipse at 50% 26%, #0a1826 0%, #060d15 55%, #04080c 100%);
    color:#bfe9fb; font-family:"JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .frame {
    width:100%; max-width:1180px; border:1px solid rgba(0,242,254,0.18); border-radius:12px;
    background:rgba(3,12,20,0.6); overflow:hidden;
    box-shadow:0 0 0 1px rgba(0,242,254,0.04), 0 24px 70px rgba(0,0,0,0.55), inset 0 0 60px rgba(0,242,254,0.04);
  }
  .bar { display:flex; align-items:center; gap:12px; padding:12px 18px;
    border-bottom:1px solid rgba(0,242,254,0.12); background:linear-gradient(180deg, rgba(0,22,34,0.8), rgba(0,14,22,0.6)); }
  .bar .dot { width:7px; height:7px; border-radius:50%; background:var(--cyan); box-shadow:0 0 10px var(--cyan); }
  .bar .title { font-size:12px; letter-spacing:4px; color:var(--cyan); text-transform:uppercase; }
  .bar .addr { margin-left:auto; font-size:10px; letter-spacing:2px; color:rgba(0,242,254,0.42); }
  .stage { position:relative; width:100%; height:560px; cursor:grab; user-select:none; touch-action:none;
    background:radial-gradient(ellipse at 50% 42%, rgba(0,60,92,0.10), rgba(0,0,0,0) 70%); }
  .stage.drag { cursor:grabbing; }
  .stage svg { width:100%; height:100%; display:block; }
  .hud { position:absolute; pointer-events:none; font-size:9px; letter-spacing:2.5px; color:rgba(0,242,254,0.34); }
  .hud.tl { top:12px; left:16px; } .hud.tr { top:12px; right:16px; text-align:right; }
  .hud.bl { bottom:12px; left:16px; } .hud.br { bottom:12px; right:16px; text-align:right; color:rgba(0,242,254,0.22); }
  .ctl { display:flex; flex-wrap:wrap; align-items:center; gap:10px 8px; padding:11px 18px;
    border-top:1px solid rgba(0,242,254,0.12); background:linear-gradient(0deg, rgba(0,22,34,0.8), rgba(0,14,22,0.6)); }
  .grp { display:flex; align-items:center; gap:6px; }
  .grp .lab { font-size:9px; letter-spacing:2px; color:rgba(0,242,254,0.4); margin-right:2px; }
  .sp { flex:1 1 auto; }
  button { background:rgba(0,242,254,0.05); border:1px solid rgba(0,242,254,0.16); color:rgba(0,242,254,0.6);
    padding:5px 12px; border-radius:5px; font-family:inherit; font-size:10px; letter-spacing:1.2px; cursor:pointer; transition:.14s; }
  button:hover { background:rgba(0,242,254,0.12); border-color:rgba(0,242,254,0.32); color:#9bf3ff; }
  button.on { background:rgba(0,242,254,0.18); border-color:rgba(0,242,254,0.55); color:#bdf6ff;
    box-shadow:0 0 14px rgba(0,242,254,0.18); }
  .legend { display:flex; flex-wrap:wrap; gap:16px; padding:9px 18px; font-size:9px; letter-spacing:1.2px;
    color:rgba(0,242,254,0.42); border-top:1px solid rgba(0,242,254,0.08); background:rgba(0,10,16,0.5); }
  .legend span { display:flex; align-items:center; gap:6px; }
  .sw { width:9px; height:9px; border-radius:2px; display:inline-block; }
</style>
</head>
<body>
<div class="frame">
  <div class="bar">
    <span class="dot"></span>
    <span class="title">JARVIS · Residence</span>
    <span class="addr">1111 MYRTLE RD · WALNUTPORT PA 18088</span>
  </div>
  <div class="stage" id="stage">
    <div class="hud tl">RESIDENCE OVERVIEW</div>
    <div class="hud tr" id="angle">35°</div>
    <div class="hud bl">DRAG TO ROTATE</div>
    <div class="hud br" id="floorTag">ALL FLOORS</div>
  </div>
  <div class="ctl">
    <div class="grp"><span class="lab">FLOOR</span>
      <button data-floor="all" class="on">ALL</button>
      <button data-floor="2f">2F</button>
      <button data-floor="1f">1F</button>
      <button data-floor="b">BSMT</button>
    </div>
    <span class="sp"></span>
    <div class="grp"><span class="lab">VIEW</span>
      <button data-theta="35">FRONT</button>
      <button data-theta="125">LEFT</button>
      <button data-theta="215">REAR</button>
      <button data-theta="305">RIGHT</button>
    </div>
  </div>
  <div class="legend">
    <span><i class="sw" style="background:#00f5a0;box-shadow:0 0 8px #00f5a0"></i>Dominant room</span>
    <span><i class="sw" style="background:#00f2fe;box-shadow:0 0 8px #00f2fe"></i>Occupied</span>
    <span><i class="sw" style="background:rgba(0,242,254,0.16);border:1px solid rgba(0,242,254,0.3)"></i>Idle</span>
    <span style="margin-left:auto;color:rgba(0,242,254,0.28)">AXONOMETRIC · REAL DIMS 63′ × 24′</span>
  </div>
</div>

<script src="./house3d_core.js"></script>
<script>
/* ===================== controller ===================== */
(function () {
  var stage = document.getElementById('stage');
  var angleEl = document.getElementById('angle');
  var floorTagEl = document.getElementById('floorTag');
  var FLOOR_LABEL = { all: 'ALL FLOORS', '1f': '1ST FLOOR', '2f': '2ND FLOOR', b: 'BASEMENT' };

  var theta = 35, floor = 'all';
  // demo presence — in the panel this comes from live area data
  var lit = {
    'master bedroom': 'dom', "eliana's room": 'on', 'garage': 'on',
    'living room': 'on', 'kitchen': 'on', 'dining room': 'on', 'guest room': 'on',
    'bath': 'on', 'basement': 'on'
  };
  var box = JARVIS3D.fixedBox({ floor: floor, lit: lit });
  var raf = null;

  function paint() {
    raf = null;
    var old = stage.querySelector('svg');
    if (old) old.remove();
    stage.insertAdjacentHTML('beforeend', JARVIS3D.renderSVG({ theta: theta, floor: floor, lit: lit, box: box }));
    angleEl.textContent = Math.round(((theta % 360) + 360) % 360) + '°';
  }
  function schedule() { if (!raf) raf = requestAnimationFrame(paint); }

  // drag to rotate
  var dragging = false, lastX = 0;
  function down(x) { dragging = true; lastX = x; stage.classList.add('drag'); }
  function move(x) { if (!dragging) return; theta += (x - lastX) * 0.5; lastX = x; schedule(); }
  function end() { dragging = false; stage.classList.remove('drag'); }
  stage.addEventListener('mousedown', function (e) { down(e.clientX); e.preventDefault(); });
  window.addEventListener('mousemove', function (e) { move(e.clientX); });
  window.addEventListener('mouseup', end);
  stage.addEventListener('touchstart', function (e) { down(e.touches[0].clientX); }, { passive: true });
  stage.addEventListener('touchmove', function (e) { move(e.touches[0].clientX); }, { passive: true });
  stage.addEventListener('touchend', end);

  // floor isolation
  document.querySelectorAll('[data-floor]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      floor = btn.getAttribute('data-floor');
      document.querySelectorAll('[data-floor]').forEach(function (b) { b.classList.toggle('on', b === btn); });
      floorTagEl.textContent = FLOOR_LABEL[floor];
      box = JARVIS3D.fixedBox({ floor: floor, lit: lit });
      paint();
    });
  });
  // view presets
  document.querySelectorAll('[data-theta]').forEach(function (btn) {
    btn.addEventListener('click', function () { theta = Number(btn.getAttribute('data-theta')); paint(); });
  });

  paint();
})();
</script>
</body>
</html>
