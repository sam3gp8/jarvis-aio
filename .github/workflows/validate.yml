name: Validate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  hassfest:
    name: Hassfest (integration manifest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  python:
    name: Python syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile all integration modules
        run: python -m compileall -q custom_components/jarvis
