name: Feature request
description: Suggest a capability or improvement for JARVIS
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like JARVIS to do?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      description: The problem it solves or the experience it improves.
  - type: textarea
    id: notes
    attributes:
      label: Implementation notes (optional)
      description: Any thoughts on how it might work, relevant entities, or hardware.
