name: Bug report
description: Something in JARVIS isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include logs where possible — JARVIS logs
        its reasoning to the dashboard's log view, and the Home Assistant log
        (Settings → System → Logs) often has the rest.
  - type: input
    id: version
    attributes:
      label: JARVIS version
      placeholder: "e.g. 6.3.2"
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2026.6.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Dashboard log lines and/or home-assistant.log excerpts.
      render: shell
  - type: textarea
    id: setup
    attributes:
      label: Setup
      description: LLM provider(s), cameras (Nest/Frigate), satellites, anything relevant.
