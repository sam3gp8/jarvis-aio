name: "JARVIS AI Assistant"
description: >
  JARVIS installation. Configure API keys, model, and core settings here.
  Advanced routing and observer mode are configured via Settings → Devices &
  Services → JARVIS → Configure (where you can use proper area and entity
  pickers).
version: "6.7.3"
slug: "jarvis_assistant"
url: "https://github.com/sam3gp8/jarvis-aio"
init: false

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

map:
  - config:rw
  - share:rw

hassio_api: true
homeassistant_api: true
hassio_role: manager
auth_api: false

options:
  # ─── Core (required) ──────────────────────────────────────────────────────
  groq_api_key: ""
  llm_provider: "groq"
  llm_base_url: ""
  model: "llama-3.3-70b-versatile"
  honorific: "sir"
  directive_preset: "guardian_steward"
  directive: ""

  # ─── Voice / TTS ──────────────────────────────────────────────────────────
  tts_provider: "piper_jarvis"
  voice_quality: "medium"
  tts_engine: "auto"
  tts_premium_engine: ""
  tts_premium_contexts:
    - "briefing"
    - "camera"
    - "doorbell"
    - "recognition"
  use_home_control: true
  cast_announce: true
  auto_pipeline: true

  # ─── Announcements (v5.4.7 — SAFE DEFAULT IS OFF) ─────────────────────────
  # Master kill switch. When false, JARVIS will NEVER speak proactively —
  # no Sentinel alerts, no Observer announcements, no scheduled briefings.
  # Direct "Hey JARVIS" conversations still work.
  announcements_enabled: false
  # Per-subsystem toggle for Sentinel anomaly detection (doors left open,
  # garage forgotten, locks left unlocked). Independent of announcements_enabled
  # but only matters when announcements_enabled is true.
  sentinel_enabled: true

  # ─── Observer Mode ─────────────────────────────────────────────────────────
  observer_enabled: false
  gemini_api_key: ""
  classifier_provider: "groq"
  classifier_model: "llama-3.3-70b-versatile"
  reasoning_provider: "groq"
  reasoning_model: "llama-3.3-70b-versatile"
  review_provider: "groq"
  review_model: "llama-3.3-70b-versatile"
  # Camera pipeline: vision model looks at the snapshot; camera-reasoning model
  # interprets what it saw (notable? what is it? announce/log/ignore).
  vision_provider: "groq"
  vision_model: "llama-3.2-11b-vision-preview"
  camera_reasoning_provider: "groq"
  camera_reasoning_model: "llama-3.3-70b-versatile"
  observer_quiet_start: "22:00"
  observer_quiet_end: "07:00"
  # Max observer/classifier LLM calls per hour. 0 = unlimited (use for local
  # LLMs like Ollama, or paid tiers with high quotas).
  classifier_rate_limit: 30
  # Local cognition layer: sees all telemetry, learns the home's rhythm, and
  # decides which anomalies escalate to a cloud LLM (additive to the static
  # filter). cognition_threshold = salience needed to escalate (0..1).
  cognition_enabled: true
  cognition_threshold: 0.6

  # ─── Relevance gate ────────────────────────────────────────────────────────
  # When true, JARVIS ignores transcribed input that clearly isn't addressed to
  # it (filler, fragments, ambient TV/background speech) instead of acting on or
  # replying to it. Set false to disable if it ever filters something you want.
  relevance_gate: true

schema:
  groq_api_key: "password?"
  llm_provider: "list(groq|openai|gemini|ollama|anthropic|custom)?"
  llm_base_url: "str?"
  model: str
  honorific: "list(sir|ma'am|boss|friend)?"
  directive_preset: "list(guardian_steward|protector|steward|witness|ally|custom)?"
  directive: "str?"
  tts_provider: "list(piper_jarvis|piper_default|edge_tts|none)?"
  voice_quality: "list(medium|high)?"
  tts_engine: "str?"
  tts_premium_engine: "str?"
  tts_premium_contexts:
    - "str?"
  use_home_control: "bool?"
  cast_announce: "bool?"
  auto_pipeline: "bool?"
  announcements_enabled: "bool?"
  sentinel_enabled: "bool?"
  observer_enabled: "bool?"
  gemini_api_key: "password?"
  classifier_provider: "list(groq|openai|gemini|ollama|anthropic|custom)?"
  classifier_model: "str?"
  reasoning_provider: "list(groq|openai|gemini|ollama|anthropic|custom)?"
  reasoning_model: "str?"
  review_provider: "list(groq|openai|gemini|ollama|anthropic|custom)?"
  review_model: "str?"
  vision_provider: "list(groq|openai|gemini|ollama|anthropic|custom)?"
  vision_model: "str?"
  camera_reasoning_provider: "list(groq|openai|gemini|ollama|anthropic|custom)?"
  camera_reasoning_model: "str?"
  observer_quiet_start: "str?"
  observer_quiet_end: "str?"
  classifier_rate_limit: "int?"
  cognition_enabled: "bool?"
  cognition_threshold: "float?"
  relevance_gate: "bool?"

panel_icon: "mdi:robot"
